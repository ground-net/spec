# groundnet/spec CI: verify the contract is well-formed + de-identified, then publish the public
# GitHub mirror. The internal GitLab repo is the source of truth; GitHub is a sanitized snapshot.
stages: [verify, sync]

# ── Verify ────────────────────────────────────────────────────────────────────
# Fast, dependency-light checks: the required documents exist, the citation metadata parses, and the
# tree carries no secret and no internal identifier (the same guards the publish step enforces, run
# early so a bad change fails before it can be published).
verify:
  stage: verify
  image: debian:stable-slim
  variables:
    GITLEAKS_VERSION: "8.24.0"
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates python3 python3-yaml >/dev/null 2>&1
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks && gitleaks version
  script:
    - |
      set -eu
      echo "== required documents present =="
      for f in README.md spec.md LICENSE CITATION.cff SECURITY.md; do
        [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
        echo "  ok: $f"
      done
      echo "== CITATION.cff is valid YAML =="
      python3 -c "import yaml,sys; yaml.safe_load(open('CITATION.cff')); print('  ok')"
      echo "== no secrets (gitleaks) =="
      gitleaks detect --source . --no-git --redact 2>&1 | tail -3
      echo "== no internal identifier (abort-on-survivor denylist) =="
      ISSUES=0
      while IFS= read -r pat; do
        case "$pat" in ''|\#*) continue ;; esac
        if grep -rnE "$pat" --include="*.md" --include="*.cff" --include="*.yml" --include="*.yaml" \
             --include="*.json" --include="*.txt" . 2>/dev/null | grep -v "github-sync/denylist.txt" | head -3; then
          echo "  DENYLIST HIT: $pat"; ISSUES=$((ISSUES+1))
        fi
      done < github-sync/denylist.txt
      [ "$ISSUES" -eq 0 ] || { echo "denylist survivors: $ISSUES — failing"; exit 1; }
      echo "verify: PASS"

# ── Public-mirror sync ────────────────────────────────────────────────────────
# Publishes the sanitized public GitHub mirror on green main (continuous). Best-effort (allow_failure)
# so a GitHub hiccup never reds an otherwise-green main. Drops history to a single owner-authored commit,
# excludes assistant/memory artifacts, re-runs gitleaks + the denylist check, and refuses to push on a
# survivor. Needs CI vars GITHUB_REPO + GITHUB_TOKEN (masked). Dry run first with DRY_RUN=1.
sync_to_github:
  stage: sync
  image: debian:stable-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
      allow_failure: true
  resource_group: github_mirror_push   # serialize: concurrent force-pushes race on refs/heads/main
  variables:
    GIT_STRATEGY: empty
    GITLEAKS_VERSION: "8.24.0"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq ca-certificates >/dev/null 2>&1
    - git clone -q "$CI_REPOSITORY_URL" .
    - git -c advice.detachedHead=false checkout -q "$CI_COMMIT_SHA"
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks && gitleaks version
  script:
    - |
      if [ "${DRY_RUN:-0}" = "1" ]; then
        bash github-sync/sync-to-github.sh --dry-run --verbose
      else
        : "${GITHUB_REPO:?set GITHUB_REPO CI variable}" "${GITHUB_TOKEN:?set GITHUB_TOKEN CI variable}"
        bash github-sync/sync-to-github.sh
      fi
